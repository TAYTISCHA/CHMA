<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>สายรหัส ตระกูล A</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          amber: {
            950: '#22110a', 900: '#3a1d0d', 800: '#5c2c0f', 700: '#7c3a10',
            600: '#c94e02', 500: '#e8620a', 400: '#ff8a1e', 300: '#ffb454', 200: '#ffd8a8', 100: '#ffe9cf'
          },
          bubble: { DEFAULT: '#ff9ecb', soft: '#ffd6e8' },
          mint: { DEFAULT: '#3fbf82', soft: '#c9f3dd' },
          paper: { DEFAULT: '#fdf5ea', deep: '#f6e6d0' },
          ink: { DEFAULT: '#2b1a0f', soft: '#5c4632' }
        },
        fontFamily: {
          display: ['Mitr', '"Noto Sans Thai"', 'ui-sans-serif'],
          sans: ['"Noto Sans Thai"', 'ui-sans-serif', 'system-ui'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular']
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="text-ink min-h-screen relative">

<div class="confetti-bg"></div>
<div class="blob w-[400px] h-[400px] -top-28 -left-20 bg-bubble-soft/60"></div>
<div class="blob w-[380px] h-[380px] top-1/3 -right-28 bg-amber-300/50"></div>
<div class="blob w-[440px] h-[440px] -bottom-36 left-1/4 bg-amber-200/60"></div>

<div id="loginView" class="min-h-screen flex items-center justify-center px-4 relative z-10">
  <div class="w-full max-w-sm">

    <div class="glass-strong rounded-[28px] p-7 pt-8">
      <div class="flex justify-center mb-2">
        <svg class="mascot" width="76" height="82" viewBox="0 0 76 82" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M30 6H46V26L61 60C64 67 59 73 52 73H24C17 73 12 67 15 60L30 26V6Z" stroke="#c94e02" stroke-width="3" stroke-linejoin="round" fill="rgba(255,255,255,0.55)"/>
          <path d="M18 52H58L55 60C53 67 48 70 43 70H33C28 70 23 67 21 60L18 52Z" fill="url(#liquidGrad)"/>
          <defs>
            <linearGradient id="liquidGrad" x1="18" y1="52" x2="58" y2="70" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ffb454"/>
              <stop offset="1" stop-color="#e8620a"/>
            </linearGradient>
          </defs>
          <line x1="26" y1="6" x2="50" y2="6" stroke="#c94e02" stroke-width="3" stroke-linecap="round"/>
          <circle cx="31" cy="61" r="3.4" fill="#2b1a0f"/>
          <circle cx="45" cy="61" r="3.4" fill="#2b1a0f"/>
          <circle cx="32.2" cy="59.7" r="1" fill="white"/>
          <circle cx="46.2" cy="59.7" r="1" fill="white"/>
          <path d="M34 66C36 68 40 68 42 66" stroke="#2b1a0f" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <circle cx="24" cy="63" r="2.6" fill="#ff9ecb" opacity="0.75"/>
          <circle cx="52" cy="63" r="2.6" fill="#ff9ecb" opacity="0.75"/>
          <circle class="bubble-pop" cx="34" cy="46" r="2" fill="#ffe9cf"/>
          <circle class="bubble-pop b2" cx="42" cy="49" r="1.5" fill="#ffe9cf"/>
          <circle class="bubble-pop b3" cx="38" cy="44" r="1.7" fill="#ffe9cf"/>
        </svg>
      </div>
      <div class="text-center mb-6">
        <h1 class="font-display text-2xl font-bold tracking-tight bg-gradient-to-r from-amber-600 via-amber-500 to-bubble bg-clip-text text-transparent">ตามล่าสายรหัส 🧪</h1>
        <p class="text-ink-soft text-sm mt-1 font-medium">ตระกูล A ✨</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="text-[11px] font-semibold text-ink-soft mb-1 block">🎓 รหัสนักศึกษา</label>
          <input id="loginStudentId" type="text" required placeholder="กรอกรหัสนักศึกษาของน้อง"
            class="w-full glass-input rounded-2xl px-3.5 py-2.5 text-sm text-ink placeholder:text-ink-soft/50 focus:ring-2 focus:ring-bubble transition" />
        </div>
        <div>
          <label class="text-[11px] font-semibold text-ink-soft mb-1 block">🔑 รหัสผ่าน (กรอกตัวเลขสาย เช่น A0 ใส่แค่ 0)</label>
          <input id="loginPassword" type="password" required placeholder="กรอกตัวเลขสาย เช่น A0 ใส่แค่ 0"
            class="w-full glass-input rounded-2xl px-3.5 py-2.5 text-sm text-ink placeholder:text-ink-soft/50 focus:ring-2 focus:ring-bubble transition" />
        </div>
        <p id="loginError" class="text-rose-600 text-xs hidden font-medium"></p>
        <button type="submit" id="loginBtn"
          class="w-full flame-btn text-white font-bold rounded-2xl py-2.5 text-sm transition font-display tracking-wide">
          เข้าสู่ระบบ 🚀
        </button>
      </form>
    </div>

    <!-- ===== ANNOUNCEMENT POPUP ===== -->
<div id="announceModal" class="hidden fixed inset-0 bg-ink/50 backdrop-blur-sm flex items-end sm:items-center justify-center z-[60] p-0 sm:p-4">
  <div class="glass-strong rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md max-h-[85vh] flex flex-col">
    <div class="flex items-center justify-between p-5 pb-3">
      <h2 class="font-display font-bold text-ink flex items-center gap-1.5">📢 ประกาศจากรุ่นพี่</h2>
      <button id="announceCloseBtn" class="w-8 h-8 rounded-full bg-ink/5 hover:bg-ink/10 flex items-center justify-center text-ink-soft transition">✕</button>
    </div>
    <div id="announceList" class="overflow-y-auto px-5 pb-2 space-y-3 flex-1"></div>
    <div class="p-5 pt-3">
      <button id="announceOkBtn" class="w-full flame-btn text-white font-bold rounded-2xl py-2.5 text-sm font-display">รับทราบแล้ว ✅</button>
    </div>
  </div>
</div>

<!-- ปุ่มลอยเปิดดูประกาศย้อนหลัง -->
<button id="announceBell" class="hidden fixed bottom-5 right-5 z-40 w-12 h-12 rounded-full flame-btn text-white text-xl sticker items-center justify-center relative">
  🔔
  <span id="announceDot" class="hidden absolute -top-1 -right-1 w-3.5 h-3.5 rounded-full bg-bubble border-2 border-white"></span>
</button>

    <a href="/admin" class="mt-4 flex items-center justify-center gap-1.5 text-xs text-ink-soft/70 hover:text-amber-700 transition">
      🛡️ เข้าสู่ระบบสำหรับรุ่นพี่ / แอดมิน
    </a>
  </div>
</div>

<div id="dashView" class="hidden max-w-2xl mx-auto px-4 py-8 relative z-10">
  <div class="glass-strong rounded-3xl p-4 flex items-center justify-between mb-7">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl flame-btn flex items-center justify-center text-lg sticker flex-shrink-0">🧪</div>
      <div>
        <p class="text-ink-soft text-xs">สวัสดีครับ/ค่ะน้อง </p>
        <h1 id="dashNickname" class="text-lg font-display font-bold text-ink"></h1>
      </div>
    </div>
    <div class="flex flex-col items-end gap-1.5">
      <span id="dashLineCode" class="px-3 py-1 rounded-full flame-btn text-white font-display font-bold text-sm sticker"></span>
      <button id="logoutBtn" class="text-[11px] text-ink-soft hover:text-amber-700 underline underline-offset-2">ออกจากระบบ</button>
    </div>
  </div>

  <div id="stepsContainer" class="space-y-2"></div>

  <p class="text-center text-ink-soft/60 text-xs mt-8">✨ อัปเดตอัตโนมัติหลังส่งภารกิจ · กดรีเฟรชเพื่อดูผลตรวจล่าสุด</p>
  <button id="refreshBtn" class="block mx-auto mt-2 text-xs text-amber-700 font-semibold underline underline-offset-2">↻ รีเฟรชสถานะ</button>
</div>

<div id="uploadModal" class="hidden fixed inset-0 bg-ink/50 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
  <div class="glass-strong rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md p-6">
    <h2 class="font-display font-bold mb-4 text-ink flex items-center gap-1.5">📮 ส่งภารกิจ <span id="modalStep" class="text-amber-600"></span></h2>

    <label class="block mb-3">
      <span class="text-[11px] font-semibold text-ink-soft">📸 แนบรูปภาพภารกิจ</span>
      <input id="imgInput" type="file" accept="image/*" capture="environment"
        class="w-full mt-1.5 text-xs file:mr-3 file:py-2 file:px-3.5 file:rounded-xl file:border-0 file:font-semibold file:bg-amber-400/80 file:text-white text-ink-soft" />
    </label>
    <img id="imgPreview" class="hidden w-full rounded-2xl mb-3 max-h-56 object-cover sticker" />

    <label class="block mb-4">
      <span class="text-[11px] font-semibold text-ink-soft">💌 ข้อความแนบ (ถ้ามี)</span>
      <textarea id="msgInput" rows="2" placeholder="เล่าให้พี่ฟังหน่อยว่าไปเจออะไรมา~"
        class="w-full mt-1.5 glass-input rounded-2xl px-3 py-2 text-sm focus:ring-2 focus:ring-bubble"></textarea>
    </label>

    <p id="uploadError" class="text-rose-600 text-xs mb-2 hidden font-medium"></p>
    <div class="flex gap-2">
      <button id="cancelUpload" class="flex-1 rounded-2xl py-2.5 text-sm border border-ink/15 text-ink-soft font-medium hover:bg-white/40 transition">ยกเลิก</button>
      <button id="confirmUpload" class="flex-1 rounded-2xl py-2.5 text-sm flame-btn text-white font-bold transition">ส่งภารกิจ 🚀</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<p class="text-center text-ink-soft/40 text-[11px] py-6 relative z-10">All Rights Reserved | IT Chemistry KMUTT.</p>

</body>
</html>
